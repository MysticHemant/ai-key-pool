name: Daily Maintenance

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-maintenance
  cancel-in-progress: true

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache research runtime state
        uses: actions/cache@v4
        with:
          path: data/
          key: research-runtime-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            research-runtime-

      - name: Run maintenance
        env:
          AIKEYPOOL_MASTER_KEY: ${{ secrets.AIKEYPOOL_MASTER_KEY }}
          AIKEYPOOL_ACTIVE_PROVIDER: ${{ secrets.AIKEYPOOL_ACTIVE_PROVIDER }}
          AIKEYPOOL_PROVIDER_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_KEYS }}
          AIKEYPOOL_PROVIDER_GROQ_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GROQ_KEYS }}
          AIKEYPOOL_PROVIDER_OPENROUTER_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_OPENROUTER_KEYS }}
          AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS }}
          AIKEYPOOL_LOG_LEVEL: INFO
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python -m src.maintenance.orchestrator

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data
          path: dashboard/
          retention-days: 7
