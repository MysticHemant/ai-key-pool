name: Daily Maintenance

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-maintenance
  cancel-in-progress: true

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Update local branch
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run maintenance
        env:
          AIKEYPOOL_MASTER_KEY: ${{ secrets.AIKEYPOOL_MASTER_KEY }}
          AIKEYPOOL_ACTIVE_PROVIDER: ${{ secrets.AIKEYPOOL_ACTIVE_PROVIDER }}
          AIKEYPOOL_PROVIDER_GROQ_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GROQ_KEYS }}
          AIKEYPOOL_PROVIDER_OPENROUTER_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_OPENROUTER_KEYS }}
          AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS }}
          AIKEYPOOL_LOG_LEVEL: INFO
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python -m src.maintenance.orchestrator

      - name: Commit dashboard updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dashboard/data

          if git diff --cached --quiet; then
            echo "No dashboard changes"
            exit 0
          fi

          git commit -m "Daily maintenance update [skip ci]"

      - name: Rebase onto latest main
        run: |
          git pull --rebase origin main

      - name: Push changes
        run: |
          git push origin main