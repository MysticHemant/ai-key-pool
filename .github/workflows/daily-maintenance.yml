name: Daily Maintenance

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily maintenance
        env:
          AIKEYPOOL_MASTER_KEY: ${{ secrets.AIKEYPOOL_MASTER_KEY }}
          AIKEYPOOL_ACTIVE_PROVIDER: ${{ secrets.AIKEYPOOL_ACTIVE_PROVIDER }}
          AIKEYPOOL_PROVIDER_GROQ_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GROQ_KEYS }}
          AIKEYPOOL_PROVIDER_OPENROUTER_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_OPENROUTER_KEYS }}
          AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS: ${{ secrets.AIKEYPOOL_PROVIDER_GITHUB_MODELS_KEYS }}
          AIKEYPOOL_LOG_LEVEL: INFO
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -m src.maintenance.orchestrator

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          git diff --staged --quiet || git commit -m "Daily maintenance update [skip ci]"
          git push
